name: 'Open Code Review'
description: 'CI/CD quality gate for AI-generated code'
author: 'raye-deng'
branding:
  icon: 'shield'
  color: 'pink'
runs:
  using: 'node20'
  main: 'dist/index.js'

inputs:
  threshold:
    description: 'Minimum quality score to pass (0-100)'
    required: true
    default: '70'
  paths:
    description: 'Glob pattern for files to scan'
    required: true
    default: 'src/**/*.{ts,js,tsx,jsx}'
  model:
    description: 'AI model to use (openai, anthropic, glm)'
    required: false
    default: 'openai'
  fail-on-issues:
    description: 'Fail the workflow if issues are found'
    required: false
    default: 'true'
  format:
    description: 'Output format (text, json, sarif)'
    required: false
    default: 'sarif'

outputs:
  score:
    description: 'Overall quality score (0-100)'
  issues-count:
    description: 'Number of issues found'
  report-path:
    description: 'Path to report file'
