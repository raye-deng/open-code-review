name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test core
        run: pnpm --filter @ai-code-validator/core test

      - name: Build core
        run: pnpm --filter @ai-code-validator/core build

      - name: Build CLI
        run: pnpm --filter ai-code-validator build

      - name: Build GitHub Action
        run: pnpm --filter @ai-code-validator/github-action build

      - name: Verify CLI works
        run: node packages/cli/dist/index.js scan packages/core/src --threshold 60

  # Dogfood: use our own GitHub Action to validate our code
  dogfood:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core (needed by action)
        run: pnpm --filter @ai-code-validator/core build

      - name: AI Code Validator (dogfood)
        uses: ./
        with:
          threshold: '60'
          paths: 'packages/core/src/**/*.ts,packages/cli/src/**/*.ts'
          fail-on-low-score: 'true'

  sync-gitlab:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to GitLab
        run: |
          git remote add gitlab https://fengsen.deng:${{ secrets.GITLAB_TOKEN }}@INTERNAL_REGISTRY/fengsen.deng/ai-code-validator.git || true
          git push gitlab main --force
