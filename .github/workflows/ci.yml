name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test (excludes tree-sitter WASM tests)
        run: cd packages/core && npx vitest run --config vitest.ci.config.ts

      - name: Build
        run: |
          pnpm --filter @open-code-review/core build
          pnpm --filter open-code-review build
          pnpm --filter @open-code-review/github-action build

      - name: Verify CLI
        run: |
          node packages/cli/dist/index.js --help
          node packages/cli/dist/index.js --version
